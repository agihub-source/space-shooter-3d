<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚀 Space Shooter 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #fff;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }
        
        #score {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        #health {
            font-size: 14px;
        }
        
        .health-bar {
            width: 120px;
            height: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 3px;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #88ff00);
            transition: width 0.3s;
        }
        
        /* 移动端虚拟控制器 */
        #mobile-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 100;
            pointer-events: none;
            display: none;
        }
        
        /* 左侧摇杆区域 */
        #joystick-area {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: auto;
        }
        
        #joystick-thumb {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        /* 右侧按钮区域 */
        #buttons-area {
            position: absolute;
            right: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
        }
        
        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            pointer-events: auto;
            transition: all 0.1s;
        }
        
        .control-btn:active {
            transform: scale(0.9);
        }
        
        #fire-btn {
            background: rgba(255, 0, 100, 0.3);
            border-color: #ff0064;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.5);
        }
        
        #fire-btn:active {
            background: rgba(255, 0, 100, 0.6);
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.8);
        }
        
        /* 开始界面 */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        
        #start-screen h1 {
            font-size: 32px;
            color: #fff;
            text-shadow: 0 0 30px #0ff, 0 0 60px #0ff;
            margin-bottom: 15px;
            text-align: center;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 30px #0ff, 0 0 60px #0ff; }
            50% { text-shadow: 0 0 40px #0ff, 0 0 80px #0ff, 0 0 100px #0ff; }
        }
        
        #start-screen p {
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        #start-btn {
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(90deg, #00bcd4, #00e5ff);
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
        }
        
        #start-btn:active {
            transform: scale(0.95);
        }
        
        .controls-info {
            margin-top: 30px;
            color: #666;
            text-align: center;
            font-size: 14px;
        }
        
        .controls-info p {
            margin: 5px 0;
        }
        
        /* 游戏结束界面 */
        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        #game-over h1 {
            font-size: 36px;
            color: #f44336;
            margin-bottom: 15px;
        }
        
        #game-over p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 25px;
        }
        
        #restart-btn {
            padding: 15px 50px;
            font-size: 18px;
            background: linear-gradient(90deg, #f44336, #ff5722);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            #mobile-controls {
                display: block;
            }
            
            #score {
                font-size: 16px;
            }
            
            .health-bar {
                width: 100px;
                height: 12px;
            }
            
            #start-screen h1 {
                font-size: 28px;
            }
            
            .control-btn {
                width: 65px;
                height: 65px;
                font-size: 20px;
            }
        }
        
        @media (min-width: 769px) {
            #mobile-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui">
        <div id="score">分数: <span id="score-value">0</span></div>
        <div id="health">
            生命值
            <div class="health-bar">
                <div class="health-fill" id="health-fill" style="width: 100%"></div>
            </div>
        </div>
    </div>
    
    <!-- 移动端虚拟控制器 -->
    <div id="mobile-controls">
        <div id="joystick-area">
            <div id="joystick-thumb"></div>
        </div>
        <div id="buttons-area">
            <div id="fire-btn" class="control-btn">🔥</div>
        </div>
    </div>
    
    <div id="start-screen">
        <h1>🚀 Space Shooter 3D</h1>
        <p>在太空中消灭敌人！</p>
        <button id="start-btn">开始游戏</button>
        <div class="controls-info">
            <p>📱 移动端：左侧摇杆移动，右侧按钮射击</p>
            <p>💻 电脑端：WASD移动，鼠标瞄准，点击射击</p>
        </div>
    </div>
    
    <div id="game-over">
        <h1>游戏结束</h1>
        <p>最终分数: <span id="final-score">0</span></p>
        <button id="restart-btn">再来一局</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 游戏变量
        let scene, camera, renderer;
        let player, bullets = [], enemies = [], particles = [];
        let score = 0;
        let health = 100;
        let gameStarted = false;
        let gameOver = false;
        
        // 控制变量
        const keys = {};
        const mouse = { x: 0, y: 0 };
        const joystick = { x: 0, y: 0, active: false };
        let autoFire = false;
        let lastFireTime = 0;
        const fireInterval = 150; // 自动射击间隔
        
        // 移动端检测
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // 初始化 Three.js
        function init() {
            // 场景
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.002);
            
            // 相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 10, 30);
            camera.lookAt(0, 0, -100);
            
            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000011);
            document.getElementById('game-container').appendChild(renderer.domElement);
            
            // 光源
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(0, 50, 50);
            scene.add(directionalLight);
            
            // 创建玩家飞船
            createPlayer();
            
            // 创建星空背景
            createStarfield();
            
            // 事件监听 - 键盘
            document.addEventListener('keydown', e => keys[e.code] = true);
            document.addEventListener('keyup', e => keys[e.code] = false);
            
            // 事件监听 - 鼠标
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', shoot);
            document.addEventListener('keydown', e => {
                if (e.code === 'Space') shoot();
            });
            
            // 事件监听 - 触摸
            setupTouchControls();
            
            window.addEventListener('resize', onWindowResize);
            
            // 按钮
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', restartGame);
            
            // 开始渲染循环
            animate();
        }
        
        function setupTouchControls() {
            const joystickArea = document.getElementById('joystick-area');
            const joystickThumb = document.getElementById('joystick-thumb');
            const fireBtn = document.getElementById('fire-btn');
            
            let joystickCenter = { x: 0, y: 0 };
            let touchId = null;
            
            // 摇杆控制
            joystickArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                const rect = joystickArea.getBoundingClientRect();
                joystickCenter = {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
                joystick.active = true;
                touchId = touch.identifier;
                updateJoystick(touch);
            });
            
            joystickArea.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (let touch of e.changedTouches) {
                    if (touch.identifier === touchId) {
                        updateJoystick(touch);
                    }
                }
            });
            
            joystickArea.addEventListener('touchend', (e) => {
                e.preventDefault();
                for (let touch of e.changedTouches) {
                    if (touch.identifier === touchId) {
                        joystick.active = false;
                        joystick.x = 0;
                        joystick.y = 0;
                        joystickThumb.style.transform = 'translate(-50%, -50%)';
                        touchId = null;
                    }
                }
            });
            
            function updateJoystick(touch) {
                const maxDistance = 40;
                let dx = touch.clientX - joystickCenter.x;
                let dy = touch.clientY - joystickCenter.y;
                
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance > maxDistance) {
                    dx = dx / distance * maxDistance;
                    dy = dy / distance * maxDistance;
                }
                
                joystick.x = dx / maxDistance;
                joystick.y = dy / maxDistance;
                
                joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            }
            
            // 射击按钮
            fireBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                autoFire = true;
            });
            
            fireBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                autoFire = false;
            });
        }
        
        function createPlayer() {
            // 飞船主体
            const geometry = new THREE.ConeGeometry(2, 6, 8);
            const material = new THREE.MeshPhongMaterial({
                color: 0x00ffff,
                emissive: 0x004444,
                shininess: 100
            });
            player = new THREE.Mesh(geometry, material);
            player.rotation.x = Math.PI / 2;
            
            // 飞船引擎光芒
            const engineGeometry = new THREE.ConeGeometry(1, 3, 8);
            const engineMaterial = new THREE.MeshBasicMaterial({
                color: 0xff4400,
                transparent: true,
                opacity: 0.8
            });
            const engine = new THREE.Mesh(engineGeometry, engineMaterial);
            engine.position.z = 4;
            engine.rotation.x = -Math.PI / 2;
            player.add(engine);
            
            // 机翼
            const wingGeometry = new THREE.BoxGeometry(8, 0.3, 2);
            const wingMaterial = new THREE.MeshPhongMaterial({
                color: 0x0088ff,
                emissive: 0x002244
            });
            const wings = new THREE.Mesh(wingGeometry, wingMaterial);
            wings.position.z = 1;
            player.add(wings);
            
            scene.add(player);
        }
        
        function createStarfield() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 3000;
            const positions = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 2000;
                positions[i + 1] = (Math.random() - 0.5) * 2000;
                positions[i + 2] = (Math.random() - 0.5) * 2000;
            }
            
            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 1.5,
                sizeAttenuation: true
            });
            
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }
        
        function createEnemy() {
            const geometry = new THREE.OctahedronGeometry(3);
            const material = new THREE.MeshPhongMaterial({
                color: 0xff0000,
                emissive: 0x440000,
                shininess: 50
            });
            const enemy = new THREE.Mesh(geometry, material);
            
            enemy.position.set(
                (Math.random() - 0.5) * 80,
                (Math.random() - 0.5) * 40,
                -200 - Math.random() * 100
            );
            
            enemy.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.3,
                (Math.random() - 0.5) * 0.3,
                0.8 + Math.random() * 0.3
            );
            
            enemy.rotationSpeed = Math.random() * 0.1;
            
            scene.add(enemy);
            enemies.push(enemy);
        }
        
        function shoot() {
            if (!gameStarted || gameOver) return;
            
            const now = Date.now();
            if (now - lastFireTime < fireInterval) return;
            lastFireTime = now;
            
            const bulletGeometry = new THREE.SphereGeometry(0.4);
            const bulletMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.9
            });
            const bullet = new THREE.Mesh(bulletGeometry, bulletMaterial);
            
            bullet.position.copy(player.position);
            bullet.velocity = new THREE.Vector3(0, 0, -5);
            
            const glowGeometry = new THREE.SphereGeometry(0.6);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.3
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            bullet.add(glow);
            
            scene.add(bullet);
            bullets.push(bullet);
        }
        
        function createExplosion(position) {
            const particleCount = 15;
            for (let i = 0; i < particleCount; i++) {
                const geometry = new THREE.SphereGeometry(0.3);
                const material = new THREE.MeshBasicMaterial({
                    color: new THREE.Color().setHSL(Math.random() * 0.1, 1, 0.5),
                    transparent: true,
                    opacity: 1
                });
                const particle = new THREE.Mesh(geometry, material);
                particle.position.copy(position);
                particle.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
                particle.life = 1;
                scene.add(particle);
                particles.push(particle);
            }
        }
        
        function onMouseMove(event) {
            if (isMobile) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function updatePlayer() {
            if (!gameStarted || gameOver) return;
            
            const speed = 0.6;
            
            // 键盘控制（桌面端）
            if (!isMobile) {
                if (keys['KeyW'] || keys['ArrowUp']) player.position.y += speed;
                if (keys['KeyS'] || keys['ArrowDown']) player.position.y -= speed;
                if (keys['KeyA'] || keys['ArrowLeft']) player.position.x -= speed;
                if (keys['KeyD'] || keys['ArrowRight']) player.position.x += speed;
                
                // 鼠标瞄准
                player.position.x += mouse.x * 0.3;
                player.position.y += mouse.y * 0.3;
            }
            
            // 摇杆控制（移动端）
            if (joystick.active) {
                player.position.x += joystick.x * speed;
                player.position.y -= joystick.y * speed;
            }
            
            // 自动射击
            if (autoFire) {
                shoot();
            }
            
            // 限制范围
            player.position.x = Math.max(-40, Math.min(40, player.position.x));
            player.position.y = Math.max(-25, Math.min(25, player.position.y));
            
            // 相机跟随
            camera.position.x = player.position.x * 0.3;
            camera.position.y = player.position.y * 0.3 + 10;
        }
        
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.position.add(bullet.velocity);
                
                if (bullet.position.z < -500) {
                    scene.remove(bullet);
                    bullets.splice(i, 1);
                }
            }
        }
        
        function updateEnemies() {
            // 生成敌人
            if (Math.random() < 0.025) {
                createEnemy();
            }
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.position.add(enemy.velocity);
                enemy.rotation.x += enemy.rotationSpeed;
                enemy.rotation.y += enemy.rotationSpeed;
                
                // 检查碰撞 - 子弹
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const bullet = bullets[j];
                    if (bullet.position.distanceTo(enemy.position) < 4) {
                        createExplosion(enemy.position);
                        scene.remove(enemy);
                        scene.remove(bullet);
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        
                        score += 100;
                        document.getElementById('score-value').textContent = score;
                        break;
                    }
                }
                
                // 检查碰撞 - 玩家
                if (enemy.position.distanceTo(player.position) < 5) {
                    createExplosion(enemy.position);
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                    
                    health -= 20;
                    document.getElementById('health-fill').style.width = health + '%';
                    
                    if (health <= 0) {
                        endGame();
                    }
                }
                
                // 移除超出范围的敌人
                if (enemy.position.z > 50) {
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                }
            }
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.position.add(particle.velocity);
                particle.life -= 0.02;
                particle.material.opacity = particle.life;
                particle.scale.multiplyScalar(0.98);
                
                if (particle.life <= 0) {
                    scene.remove(particle);
                    particles.splice(i, 1);
                }
            }
        }
        
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            gameStarted = true;
            gameOver = false;
            score = 0;
            health = 100;
            document.getElementById('score-value').textContent = '0';
            document.getElementById('health-fill').style.width = '100%';
        }
        
        function endGame() {
            gameOver = true;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'flex';
        }
        
        function restartGame() {
            enemies.forEach(e => scene.remove(e));
            bullets.forEach(b => scene.remove(b));
            particles.forEach(p => scene.remove(p));
            enemies = [];
            bullets = [];
            particles = [];
            
            player.position.set(0, 0, 0);
            player.rotation.set(Math.PI / 2, 0, 0);
            
            document.getElementById('game-over').style.display = 'none';
            gameStarted = true;
            gameOver = false;
            score = 0;
            health = 100;
            document.getElementById('score-value').textContent = '0';
            document.getElementById('health-fill').style.width = '100%';
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameStarted && !gameOver) {
                updatePlayer();
                updateBullets();
                updateEnemies();
                updateParticles();
            }
            
            renderer.render(scene, camera);
        }
        
        // 启动游戏
        init();
    </script>
</body>
</html>
